[package]
name = "npc_engine_rust"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tokio = { version = "1", features = ["full"] }
warp = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_derive = "1.0"
serde_json = "1.0"
dotenv = "0.15"
futures = "0.3"
rand = "0.8"
once_cell = "1.17.1"
pathfinding = "4.9.1"
env_logger = "0.10.0"